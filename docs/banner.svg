<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#1a1040"/>
    </linearGradient>
    <linearGradient id="portal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8a2be2"/>
      <stop offset="100%" style="stop-color:#00c8ff"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8a2be2"/>
      <stop offset="50%" style="stop-color:#00c8ff"/>
      <stop offset="100%" style="stop-color:#8a2be2"/>
    </linearGradient>
  </defs>
  <rect width="800" height="200" fill="url(#bg)" rx="12"/>
  <!-- Portal circles -->
  <circle cx="100" cy="100" r="50" fill="none" stroke="url(#portal)" stroke-width="2" opacity="0.3"/>
  <circle cx="100" cy="100" r="35" fill="none" stroke="url(#portal)" stroke-width="1.5" opacity="0.5"/>
  <circle cx="100" cy="100" r="20" fill="url(#portal)" opacity="0.2"/>
  <circle cx="700" cy="100" r="50" fill="none" stroke="url(#portal)" stroke-width="2" opacity="0.3"/>
  <circle cx="700" cy="100" r="35" fill="none" stroke="url(#portal)" stroke-width="1.5" opacity="0.5"/>
  <circle cx="700" cy="100" r="20" fill="url(#portal)" opacity="0.2"/>
  <!-- Stars -->
  <circle cx="200" cy="30" r="1.5" fill="#fff" opacity="0.6"/>
  <circle cx="350" cy="45" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="500" cy="25" r="1.5" fill="#fff" opacity="0.5"/>
  <circle cx="600" cy="50" r="1" fill="#fff" opacity="0.3"/>
  <circle cx="250" cy="170" r="1" fill="#fff" opacity="0.4"/>
  <circle cx="550" cy="175" r="1.5" fill="#fff" opacity="0.5"/>
  <!-- Title -->
  <text x="400" y="75" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="36" font-weight="700" fill="url(#text-grad)">NEXUS Portal Serüveni</text>
  <text x="400" y="110" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="16" fill="#7a8ba5">ALKÜ × NEXUS — CI/CD Bootcamp</text>
  <!-- Subtitle -->
  <text x="400" y="145" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#8a2be2">10 Portal  ·  10 Bulmaca  ·  1 Gizli Mesaj</text>
  <!-- Bottom line -->
  <line x1="200" y1="170" x2="600" y2="170" stroke="url(#portal)" stroke-width="1" opacity="0.3"/>
</svg>
